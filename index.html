<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EmulatorJS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: monospace;
    background: radial-gradient(circle at top, #1e1f22, #0b0c0f);
    color: #ddd;
}

/* layout */
body, #box, #top {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

/* title */
#top h1 {
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,255,255,0.15);
}

/* upload box */
#box {
    height: 20em;
    width: 30em;
    max-width: 80%;
    max-height: 80%;
    background: linear-gradient(145deg, #2a2d31, #15171a);
    border: 1px solid #3a3f46;
    border-radius: 10px;
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.7);
    text-align: center;
    font-size: 18px;
    color: #aaa;
    transition: 0.2s;
}

#box:hover, #box[drag] {
    border-color: #00d0ff;
    color: #fff;
    box-shadow: 0 0 25px rgba(0,208,255,0.3);
}

/* advanced panel */
#advanced {
    width: 30em;
    max-width: 80%;
    background: linear-gradient(145deg, #2a2d31, #15171a);
    border: 1px solid #3a3f46;
    border-radius: 10px;
    margin: 10px;
    padding: 10px;
}

/* file input overlay */
#input {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
}

/* emulator canvas */
#display {
    position: absolute;
    inset: 0;
}

#game {
    width: 100%;
    height: 100%;
}

/* buttons */
button, select {
    background: linear-gradient(145deg, #3a3f46, #1b1d21);
    border: 1px solid #444;
    color: #ddd;
    padding: 0.5em;
    margin: 0.3em;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover, select:hover {
    border-color: #00d0ff;
    box-shadow: 0 0 12px rgba(0,208,255,0.4);
}
</style>
</head>

<body>

<div id="top">
    <h1>EmulatorJS</h1>
</div>

<div id="box">
    <input type="file" id="input">
    Drag & drop ROM or click here
</div>

<div id="advanced">
    <input type="checkbox" id="advancedToggle"> Show Advanced Options
    <div id="advancedOptionsBox" style="display:none;">
        <input type="checkbox" id="debugToggle"> Debug Mode
    </div>
</div>

<script>
let enableDebug = false;

/* safety warning for local use */
if (location.protocol === "file:") {
    alert("Use a local server or GitHub Pages.\nDo NOT open via file://");
}

/* toggle advanced */
document.getElementById("advancedToggle").onchange = e => {
    document.getElementById("advancedOptionsBox").style.display =
        e.target.checked ? "block" : "none";
};

/* debug toggle */
document.getElementById("debugToggle").onchange = e => {
    enableDebug = e.target.checked;
};

/* MAIN EMULATOR LOADER */
async function run(fileObj) {

    const div = document.createElement("div");
    const sub = document.createElement("div");
    const script = document.createElement("script");

    sub.id = "game";
    div.id = "display";

    document.getElementById("top").remove();
    document.getElementById("box").remove();
    document.getElementById("advanced").remove();

    div.appendChild(sub);
    document.body.appendChild(div);

    window.EJS_player = "#game";

    // ✅ CRITICAL FIX: convert File → Blob URL (this is REQUIRED)
    const url = URL.createObjectURL(fileObj);
    window.EJS_gameUrl = url;

    // ✅ safe core handling
    window.EJS_core = "gba";

    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;

    script.src = "data/loader.js";
    document.body.appendChild(script);
}
/* file input */
input.onchange = () => {
    if (!input.files.length) return;
    run(input.files[0]);
};
</script>

</body>
</html>
